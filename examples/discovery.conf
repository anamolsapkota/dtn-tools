# DTN Neighbor Discovery Configuration
# Generated by 'dtn init' — paths are auto-detected from ~/dtn/

# This node's IPN number (auto-detected from ION if empty)
my_ipn=

# Gateway node for reaching non-local nodes
gateway_ipn=268485000

# Scan interval in seconds (default: 300 = 5 minutes)
scan_interval=300

# openipn.org data sources
openipn_metadata_url=https://openipn.org/metadata_list.txt
openipn_graph_url=https://openipn.org/contactGraph.gv

# Local dtnex metadata file (default: ~/dtn/nodesmetadata.txt)
#local_metadata_file=

# Persistent discovery database (default: ~/dtn/dtn-discovery/discovered_nodes.json)
#discovered_db=

# Log file (default: ~/dtn/dtn-discovery/discovery.log)
#log_file=

# Auto-add discovered nodes to ION contact graph
# Adds contacts/ranges so CGR can compute routes
auto_add_contacts=true

# Route newly discovered nodes through the gateway
auto_add_via_gateway=true

# ION contact parameters
contact_rate=100000
contact_duration=360000000
owlt=1

# IPND (IP Neighbor Discovery) for local subnet beacons
ipnd_enabled=true
#ipnd_config=

# Debug logging
debug=false
